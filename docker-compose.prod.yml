services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - generated-images:/app/public/generated

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aba2026}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aba2026}
      POSTGRES_DB: ${POSTGRES_DB:-aba2026}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aba2026}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  generated-images:
